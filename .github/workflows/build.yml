name: Build KCheckLicense.exe

# Chạy khi: push lên main, tạo tag v* (để phát hành), hoặc bấm tay trong tab Actions.
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write   # cần để đính kèm .exe vào Release khi push tag

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Cài PS2EXE
        shell: powershell
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name ps2exe -Scope CurrentUser -Force

      - name: Biên dịch KCheckLicense.ps1 -> KCheckLicense.exe
        shell: powershell
        run: |
          Import-Module ps2exe
          Invoke-ps2exe `
            -InputFile   .\KCheckLicense.ps1 `
            -OutputFile  .\KCheckLicense.exe `
            -iconFile    .\icon.ico `
            -requireAdmin `
            -title       'KCheckLicense' `
            -description 'Kiem tra ban quyen & phat hien crack Windows/Office/IDM/WinRAR/Adobe' `
            -company     'kollersi.com' `
            -product     'KCheckLicense' `
            -version     '2.0.0.0'
          if (-not (Test-Path .\KCheckLicense.exe)) { throw 'Bien dich that bai' }

      - name: Tải file .exe lên (artifact của mỗi lần chạy)
        uses: actions/upload-artifact@v4
        with:
          name: KCheckLicense
          path: KCheckLicense.exe

      - name: Đính kèm .exe vào Release (chỉ khi push tag v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: KCheckLicense.exe

      - name: Cập nhật Release "latest" (mỗi lần build xong trên main)
        if: github.ref == 'refs/heads/main'
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          Write-Host "[*] gh version:"
          gh --version

          gh release view latest 1>$null 2>$null
          $exists = ($LASTEXITCODE -eq 0)
          Write-Host "[*] Release 'latest' da ton tai: $exists"

          if ($exists) {
            Write-Host "[*] Dang cap nhat file vao release 'latest'..."
            gh release upload latest .\KCheckLicense.exe --clobber
          } else {
            Write-Host "[*] Dang tao moi release 'latest'..."
            gh release create latest .\KCheckLicense.exe `
              --title "KCheckLicense - Ban moi nhat" `
              --notes "Ban build tu dong tu nhanh main. Link nay luon la ban moi nhat, tu dong cap nhat sau moi lan sua code."
          }

          if ($LASTEXITCODE -ne 0) {
            throw "Cap nhat release 'latest' that bai, exit code $LASTEXITCODE"
          }
          Write-Host "[OK] Da cap nhat release 'latest'."
